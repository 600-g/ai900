<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-900 문제풀이</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --primary: #0078d4;
  --success: #107c10;
  --danger: #d13438;
  --bg: #f4f4f4;
  --card-bg: #fff;
  --text: #323130;
  --text-muted: #605e5c;
  --border: #edebe9;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; margin: 0; padding: 0; }
.navbar { background: var(--primary); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.navbar h1 { color: #fff; font-size: 1.2rem; margin: 0; font-weight: 600; }
.navbar a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .9rem; margin-left: 16px; }
.navbar a:hover { color: #fff; }
.container-custom { max-width: 720px; margin: 0 auto; padding: 20px 16px; }

/* 시작 화면 */
.setup-card { background: var(--card-bg); border-radius: 12px; padding: 32px 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.setup-card h2 { font-size: 1.4rem; margin-bottom: 24px; text-align: center; }
.domain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
.domain-btn { padding: 10px; border: 2px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; text-align: center; font-size: .85rem; transition: all .15s; }
.domain-btn:hover { border-color: var(--primary); }
.domain-btn.active { border-color: var(--primary); background: #e8f0fe; color: var(--primary); font-weight: 600; }
.count-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; justify-content: center; }
.count-btn { padding: 10px 20px; border: 2px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 1rem; transition: all .15s; }
.count-btn:hover { border-color: var(--primary); }
.count-btn.active { border-color: var(--primary); background: #e8f0fe; color: var(--primary); font-weight: 600; }
.start-btn { display: block; width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
.start-btn:hover { background: #106ebe; }
.start-btn:disabled { background: #bbb; cursor: not-allowed; }

/* 퀴즈 화면 */
.quiz-card { background: var(--card-bg); border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.progress-bar-wrap { background: var(--border); border-radius: 6px; height: 8px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 6px; transition: width .3s; }
.quiz-meta { display: flex; justify-content: space-between; font-size: .85rem; color: var(--text-muted); margin-bottom: 16px; }
.quiz-question { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; font-weight: 500; }
.quiz-question img { max-width: 100%; border-radius: 8px; margin-top: 12px; }
.option-list { list-style: none; padding: 0; margin: 0 0 20px; }
.option-item { padding: 14px 16px; border: 2px solid var(--border); border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: all .15s; display: flex; align-items: flex-start; gap: 10px; }
.option-item:hover { border-color: var(--primary); background: #fafafa; }
.option-item.selected { border-color: var(--primary); background: #e8f0fe; }
.option-item.correct { border-color: var(--success); background: #dff6dd; }
.option-item.wrong { border-color: var(--danger); background: #fde7e9; }
.option-item.disabled { pointer-events: none; }
.option-label { font-weight: 600; color: var(--primary); min-width: 24px; }
.explanation-box { background: #f0f6ff; border-left: 4px solid var(--primary); padding: 16px; border-radius: 0 8px 8px 0; margin-bottom: 20px; font-size: .95rem; line-height: 1.6; display: none; }
.btn-row { display: flex; gap: 10px; }
.submit-btn, .next-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
.submit-btn { background: var(--primary); color: #fff; }
.submit-btn:hover { background: #106ebe; }
.submit-btn:disabled { background: #bbb; cursor: not-allowed; }
.next-btn { background: #e8f0fe; color: var(--primary); display: none; }
.next-btn:hover { background: #d0e2fc; }

/* 결과 화면 */
.result-card { background: var(--card-bg); border-radius: 12px; padding: 32px 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); text-align: center; }
.result-score { font-size: 3rem; font-weight: 700; color: var(--primary); }
.result-label { font-size: 1rem; color: var(--text-muted); margin-bottom: 20px; }
.result-detail { font-size: .95rem; margin-bottom: 8px; }
.result-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: center; flex-wrap: wrap; }
.result-actions a, .result-actions button { padding: 12px 24px; border-radius: 8px; font-size: .95rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; }
.btn-primary-custom { background: var(--primary); color: #fff; }
.btn-outline-custom { background: #fff; color: var(--primary); border: 2px solid var(--primary); }

/* 모바일 */
@media (max-width: 480px) {
  .container-custom { padding: 12px; }
  .setup-card, .quiz-card, .result-card { padding: 20px 16px; }
  .domain-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav class="navbar">
  <h1>AI-900 문제풀이</h1>
  <div>
    <a href="review.html">오답복습</a>
    <a href="stats.html">통계</a>
  </div>
</nav>

<div class="container-custom">
  <!-- 시작 화면 -->
  <div id="setup-screen" class="setup-card">
    <h2>시험 준비 시작</h2>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:20px;">도메인과 문제 수를 선택하세요</p>

    <label style="font-weight:600;margin-bottom:8px;display:block;">도메인 선택</label>
    <div class="domain-grid" id="domain-grid"></div>

    <label style="font-weight:600;margin-bottom:8px;display:block;">문제 수</label>
    <div class="count-grid" id="count-grid"></div>

    <button class="start-btn" id="start-btn" onclick="startQuiz()">시작하기</button>
    <p id="question-info" style="text-align:center;color:var(--text-muted);font-size:.85rem;margin-top:12px;"></p>
  </div>

  <!-- 퀴즈 화면 -->
  <div id="quiz-screen" style="display:none;">
    <div class="quiz-card">
      <div class="progress-bar-wrap"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="quiz-meta">
        <span id="quiz-counter">1 / 10</span>
        <span id="quiz-domain" class="badge bg-secondary"></span>
      </div>
      <div class="quiz-question" id="quiz-question"></div>
      <ul class="option-list" id="option-list"></ul>
      <div class="explanation-box" id="explanation-box"></div>
      <div class="btn-row">
        <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">답 제출</button>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
      </div>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="result-screen" style="display:none;">
    <div class="result-card">
      <div class="result-score" id="result-score">0%</div>
      <div class="result-label">정답률</div>
      <div class="result-detail" id="result-detail"></div>
      <div class="result-detail" id="result-wrong-count"></div>
      <div class="result-actions">
        <button class="btn-primary-custom" onclick="location.reload()">다시 풀기</button>
        <a href="review.html" class="btn-outline-custom">오답 복습</a>
        <a href="stats.html" class="btn-outline-custom">통계 보기</a>
      </div>
    </div>
  </div>
</div>

<script>
let allQuestions = [];
let quizQuestions = [];
let currentIndex = 0;
let selectedOption = null;
let answered = false;
let correctCount = 0;
let sessionWrong = [];

const COUNTS = [10, 20, 50];
let selectedDomain = '전체';
let selectedCount = 10;

async function loadQuestions() {
  try {
    const res = await fetch('data/questions.json');
    allQuestions = await res.json();
    buildSetup();
  } catch (e) {
    document.getElementById('setup-screen').innerHTML = '<p style="text-align:center;color:red;">문제 데이터를 불러올 수 없습니다.<br>data/questions.json 파일을 확인해주세요.</p>';
  }
}

function buildSetup() {
  const domains = ['전체', ...new Set(allQuestions.map(q => q.domain))];
  const grid = document.getElementById('domain-grid');
  grid.innerHTML = '';
  domains.forEach(d => {
    const btn = document.createElement('div');
    btn.className = 'domain-btn' + (d === selectedDomain ? ' active' : '');
    btn.textContent = d;
    const count = d === '전체' ? allQuestions.length : allQuestions.filter(q => q.domain === d).length;
    btn.textContent = d + ' (' + count + ')';
    btn.onclick = () => { selectedDomain = d; buildSetup(); updateInfo(); };
    grid.appendChild(btn);
  });

  const countGrid = document.getElementById('count-grid');
  countGrid.innerHTML = '';
  const filtered = getFilteredQuestions();
  COUNTS.forEach(c => {
    if (c > filtered.length && c !== COUNTS[0]) return;
    const btn = document.createElement('div');
    btn.className = 'count-btn' + (c === selectedCount ? ' active' : '');
    btn.textContent = c + '문제';
    btn.onclick = () => { selectedCount = c; buildSetup(); };
    countGrid.appendChild(btn);
  });
  // 전체 버튼
  const allBtn = document.createElement('div');
  allBtn.className = 'count-btn' + (selectedCount === 0 ? ' active' : '');
  allBtn.textContent = '전체 (' + filtered.length + ')';
  allBtn.onclick = () => { selectedCount = 0; buildSetup(); };
  countGrid.appendChild(allBtn);

  updateInfo();
}

function getFilteredQuestions() {
  if (selectedDomain === '전체') return [...allQuestions];
  return allQuestions.filter(q => q.domain === selectedDomain);
}

function updateInfo() {
  const filtered = getFilteredQuestions();
  const actual = selectedCount === 0 ? filtered.length : Math.min(selectedCount, filtered.length);
  document.getElementById('question-info').textContent = actual + '문제를 풀게 됩니다';
  document.getElementById('start-btn').disabled = filtered.length === 0;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  let filtered = getFilteredQuestions();
  shuffle(filtered);
  const count = selectedCount === 0 ? filtered.length : Math.min(selectedCount, filtered.length);
  quizQuestions = filtered.slice(0, count);
  currentIndex = 0;
  correctCount = 0;
  sessionWrong = [];
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[currentIndex];
  selectedOption = null;
  answered = false;

  const pct = ((currentIndex) / quizQuestions.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('quiz-counter').textContent = (currentIndex + 1) + ' / ' + quizQuestions.length;
  document.getElementById('quiz-domain').textContent = q.domain;

  let questionHTML = q.question;
  if (q.has_image && q.image_path) {
    questionHTML += '<img src="' + q.image_path + '" alt="문제 이미지">';
  }
  document.getElementById('quiz-question').innerHTML = questionHTML;

  const list = document.getElementById('option-list');
  list.innerHTML = '';
  Object.entries(q.options).forEach(([key, val]) => {
    const li = document.createElement('li');
    li.className = 'option-item';
    li.dataset.key = key;
    li.innerHTML = '<span class="option-label">' + key + '</span><span>' + val + '</span>';
    li.onclick = () => selectOption(li, key);
    list.appendChild(li);
  });

  document.getElementById('explanation-box').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('next-btn').style.display = 'none';
}

function selectOption(el, key) {
  if (answered) return;
  document.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedOption = key;
  document.getElementById('submit-btn').disabled = false;
}

function submitAnswer() {
  if (!selectedOption || answered) return;
  answered = true;
  const q = quizQuestions[currentIndex];
  const isCorrect = selectedOption === q.answer;

  document.querySelectorAll('.option-item').forEach(el => {
    el.classList.add('disabled');
    if (el.dataset.key === q.answer) el.classList.add('correct');
    if (el.dataset.key === selectedOption && !isCorrect) el.classList.add('wrong');
  });

  if (isCorrect) {
    correctCount++;
  } else {
    sessionWrong.push(q.id);
    saveWrong(q.id);
  }

  const expBox = document.getElementById('explanation-box');
  expBox.innerHTML = (isCorrect ? '✅ 정답!' : '❌ 오답! 정답: ' + q.answer) + '<br><br>' + q.explanation;
  expBox.style.display = 'block';

  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';

  // 마지막 문제면 버튼 텍스트 변경
  if (currentIndex === quizQuestions.length - 1) {
    document.getElementById('next-btn').textContent = '결과 보기 →';
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= quizQuestions.length) {
    showResult();
    return;
  }
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const pct = Math.round(correctCount / quizQuestions.length * 100);
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-detail').textContent = quizQuestions.length + '문제 중 ' + correctCount + '문제 정답';
  document.getElementById('result-wrong-count').textContent = sessionWrong.length > 0 ? '오답 ' + sessionWrong.length + '문제가 오답노트에 저장되었습니다' : '모두 맞혔습니다! 🎉';

  saveStats(quizQuestions.length, correctCount);
}

// localStorage 관리
function saveWrong(id) {
  let list = JSON.parse(localStorage.getItem('ai900_wrong_list') || '[]');
  if (!list.includes(id)) list.push(id);
  localStorage.setItem('ai900_wrong_list', JSON.stringify(list));
}

function saveStats(total, correct) {
  let stats = JSON.parse(localStorage.getItem('ai900_stats') || '{"sessions":[],"totalAnswered":0,"totalCorrect":0}');
  stats.totalAnswered += total;
  stats.totalCorrect += correct;
  stats.sessions.push({
    date: new Date().toISOString(),
    total: total,
    correct: correct,
    domain: selectedDomain,
    pct: Math.round(correct / total * 100)
  });
  localStorage.setItem('ai900_stats', JSON.stringify(stats));
  localStorage.setItem('ai900_last_session', JSON.stringify({
    date: new Date().toISOString(),
    total: total,
    correct: correct
  }));
}

loadQuestions();
</script>
</body>
</html>
