<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-900 통계</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root { --primary:#0078d4; --success:#107c10; --danger:#d13438; --bg:#f4f4f4; --card-bg:#fff; --text:#323130; --text-muted:#605e5c; --border:#edebe9; }
* { box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',-apple-system,sans-serif; margin:0; }
.navbar { background:var(--primary); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
.navbar h1 { color:#fff; font-size:1.2rem; margin:0; font-weight:600; }
.navbar a { color:rgba(255,255,255,.85); text-decoration:none; font-size:.9rem; margin-left:16px; }
.navbar a:hover { color:#fff; }
.container-custom { max-width:720px; margin:0 auto; padding:20px 16px; }
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
.stat-box { background:var(--card-bg); border-radius:12px; padding:20px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.stat-value { font-size:2rem; font-weight:700; color:var(--primary); }
.stat-label { font-size:.8rem; color:var(--text-muted); margin-top:4px; }
.chart-card { background:var(--card-bg); border-radius:12px; padding:24px; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:20px; }
.chart-card h3 { font-size:1rem; margin:0 0 16px; font-weight:600; }
.session-list { list-style:none; padding:0; margin:0; }
.session-item { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); font-size:.9rem; }
.session-item:last-child { border-bottom:none; }
.session-date { color:var(--text-muted); }
.session-score { font-weight:600; }
.empty-state { text-align:center; padding:60px 20px; }
.empty-state .icon { font-size:3rem; margin-bottom:16px; }
.empty-state p { color:var(--text-muted); }
.reset-btn { display:block; margin:20px auto 0; padding:10px 24px; background:var(--danger); color:#fff; border:none; border-radius:8px; font-size:.9rem; cursor:pointer; }
.reset-btn:hover { background:#b02a2d; }
@media (max-width:480px) { .stat-grid { grid-template-columns:1fr; } .container-custom { padding:12px; } }
</style>
</head>
<body>

<nav class="navbar">
  <h1>학습 통계</h1>
  <div>
    <a href="index.html">문제풀기</a>
    <a href="review.html">오답복습</a>
  </div>
</nav>

<div class="container-custom" id="content"></div>

<script>
function init() {
  const stats = JSON.parse(localStorage.getItem('ai900_stats') || 'null');
  const container = document.getElementById('content');

  if (!stats || stats.sessions.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>아직 학습 기록이 없습니다.<br>문제를 풀면 통계가 나타납니다!</p><a href="index.html" style="display:inline-block;margin-top:16px;padding:12px 24px;background:#0078d4;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;">문제 풀러 가기</a></div>';
    return;
  }

  const totalPct = stats.totalAnswered > 0 ? Math.round(stats.totalCorrect / stats.totalAnswered * 100) : 0;
  const wrongCount = JSON.parse(localStorage.getItem('ai900_wrong_list') || '[]').length;

  let html = `
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-value">${stats.totalAnswered}</div>
      <div class="stat-label">총 풀이 수</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${totalPct}%</div>
      <div class="stat-label">전체 정답률</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${wrongCount}</div>
      <div class="stat-label">누적 오답</div>
    </div>
  </div>

  <div class="chart-card">
    <h3>세션별 정답률</h3>
    <canvas id="chart-sessions" height="200"></canvas>
  </div>

  <div class="chart-card">
    <h3>최근 학습 기록</h3>
    <ul class="session-list">
      ${stats.sessions.slice(-10).reverse().map(s => {
        const d = new Date(s.date);
        const dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
        const color = s.pct >= 80 ? 'var(--success)' : s.pct >= 50 ? '#e8a300' : 'var(--danger)';
        return `<li class="session-item">
          <span class="session-date">${dateStr} · ${s.domain || '전체'}</span>
          <span class="session-score" style="color:${color}">${s.correct}/${s.total} (${s.pct}%)</span>
        </li>`;
      }).join('')}
    </ul>
  </div>

  <button class="reset-btn" onclick="resetStats()">통계 초기화</button>
  `;

  container.innerHTML = html;
  drawChart(stats.sessions);
}

function drawChart(sessions) {
  const last = sessions.slice(-15);
  const ctx = document.getElementById('chart-sessions');
  if (!ctx) return;

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: last.map((s, i) => '#' + (i + 1)),
      datasets: [{
        label: '정답률 (%)',
        data: last.map(s => s.pct),
        borderColor: '#0078d4',
        backgroundColor: 'rgba(0,120,212,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#0078d4'
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v + '%' } }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function resetStats() {
  if (confirm('모든 통계를 초기화하시겠습니까?')) {
    localStorage.removeItem('ai900_stats');
    localStorage.removeItem('ai900_last_session');
    init();
  }
}

init();
</script>
</body>
</html>
