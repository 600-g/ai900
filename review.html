<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-900 오답 복습</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root { --primary:#0078d4; --success:#107c10; --danger:#d13438; --bg:#f4f4f4; --card-bg:#fff; --text:#323130; --text-muted:#605e5c; --border:#edebe9; }
* { box-sizing: border-box; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',-apple-system,sans-serif; margin:0; }
.navbar { background:var(--primary); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
.navbar h1 { color:#fff; font-size:1.2rem; margin:0; font-weight:600; }
.navbar a { color:rgba(255,255,255,.85); text-decoration:none; font-size:.9rem; margin-left:16px; }
.navbar a:hover { color:#fff; }
.container-custom { max-width:720px; margin:0 auto; padding:20px 16px; }
.empty-state { text-align:center; padding:60px 20px; }
.empty-state .icon { font-size:3rem; margin-bottom:16px; }
.empty-state p { color:var(--text-muted); font-size:1.1rem; }
.wrong-card { background:var(--card-bg); border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,.08); cursor:pointer; transition:all .15s; }
.wrong-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.12); }
.wrong-card.expanded { cursor:default; }
.wrong-header { display:flex; justify-content:space-between; align-items:center; }
.wrong-id { font-size:.8rem; color:var(--text-muted); }
.wrong-domain { font-size:.75rem; background:#e8f0fe; color:var(--primary); padding:2px 8px; border-radius:4px; }
.wrong-preview { margin-top:8px; font-size:.95rem; line-height:1.5; }
.wrong-detail { display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
.wrong-detail.show { display:block; }
.wrong-options { list-style:none; padding:0; margin:12px 0; }
.wrong-options li { padding:10px 14px; border-radius:6px; margin-bottom:6px; font-size:.9rem; }
.wrong-options li.correct-opt { background:#dff6dd; border-left:4px solid var(--success); }
.wrong-options li.normal-opt { background:#f8f8f8; }
.explanation-text { background:#f0f6ff; border-left:4px solid var(--primary); padding:12px 16px; border-radius:0 8px 8px 0; font-size:.9rem; line-height:1.6; margin-top:12px; }
.done-btn { margin-top:12px; padding:8px 20px; background:var(--success); color:#fff; border:none; border-radius:6px; font-size:.9rem; cursor:pointer; }
.done-btn:hover { background:#0b6b0b; }
.clear-all-btn { display:block; margin:20px auto 0; padding:10px 24px; background:var(--danger); color:#fff; border:none; border-radius:8px; font-size:.9rem; cursor:pointer; }
.clear-all-btn:hover { background:#b02a2d; }
.count-badge { background:var(--danger); color:#fff; padding:2px 10px; border-radius:12px; font-size:.85rem; margin-left:8px; }
@media (max-width:480px) { .container-custom { padding:12px; } .wrong-card { padding:16px; } }
</style>
</head>
<body>

<nav class="navbar">
  <h1>오답 복습 <span class="count-badge" id="count-badge">0</span></h1>
  <div>
    <a href="index.html">문제풀기</a>
    <a href="stats.html">통계</a>
  </div>
</nav>

<div class="container-custom" id="content"></div>

<script>
let allQuestions = [];

async function init() {
  try {
    const res = await fetch('data/questions.json');
    allQuestions = await res.json();
  } catch(e) {
    document.getElementById('content').innerHTML = '<p style="text-align:center;color:red;">문제 데이터를 불러올 수 없습니다.</p>';
    return;
  }
  render();
}

function getWrongList() {
  return JSON.parse(localStorage.getItem('ai900_wrong_list') || '[]');
}

function saveWrongList(list) {
  localStorage.setItem('ai900_wrong_list', JSON.stringify(list));
}

function render() {
  const wrongIds = getWrongList();
  const badge = document.getElementById('count-badge');
  badge.textContent = wrongIds.length;
  const container = document.getElementById('content');

  if (wrongIds.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>오답이 없어요!<br>계속 이렇게 화이팅!</p><a href="index.html" style="display:inline-block;margin-top:16px;padding:12px 24px;background:#0078d4;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;">문제 풀러 가기</a></div>';
    return;
  }

  const wrongQuestions = wrongIds.map(id => allQuestions.find(q => q.id === id)).filter(Boolean);
  let html = '';
  wrongQuestions.forEach((q, i) => {
    html += `
    <div class="wrong-card" id="card-${q.id}" onclick="toggleDetail('${q.id}')">
      <div class="wrong-header">
        <span class="wrong-id">${q.id}</span>
        <span class="wrong-domain">${q.domain}</span>
      </div>
      <div class="wrong-preview">${q.question.substring(0, 100)}${q.question.length > 100 ? '...' : ''}</div>
      <div class="wrong-detail" id="detail-${q.id}">
        <p style="font-size:.95rem;line-height:1.6;">${q.question}</p>
        <ul class="wrong-options">
          ${Object.entries(q.options).map(([k,v]) =>
            `<li class="${k === q.answer ? 'correct-opt' : 'normal-opt'}"><strong>${k}.</strong> ${v} ${k === q.answer ? ' ✅' : ''}</li>`
          ).join('')}
        </ul>
        <div class="explanation-text">${q.explanation}</div>
        <button class="done-btn" onclick="event.stopPropagation(); markDone('${q.id}')">이 문제 완료 ✓</button>
      </div>
    </div>`;
  });

  html += '<button class="clear-all-btn" onclick="clearAll()">전체 오답 초기화</button>';
  container.innerHTML = html;
}

function toggleDetail(id) {
  const detail = document.getElementById('detail-' + id);
  const card = document.getElementById('card-' + id);
  if (detail.classList.contains('show')) {
    detail.classList.remove('show');
    card.classList.remove('expanded');
  } else {
    detail.classList.add('show');
    card.classList.add('expanded');
  }
}

function markDone(id) {
  let list = getWrongList();
  list = list.filter(x => x !== id);
  saveWrongList(list);
  render();
}

function clearAll() {
  if (confirm('모든 오답 기록을 삭제하시겠습니까?')) {
    saveWrongList([]);
    render();
  }
}

init();
</script>
</body>
</html>
